<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Coming Soon - theTutor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-color: #010813d3;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .placeholder-container {
            text-align: center;
            max-width: 500px;
            background: rgba(24, 6, 36, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }
        .icon-wrapper {
            font-size: 64px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #e3f2fd;
        }
        p {
            color: #a0a5b0;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .action-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #007bff;
            transform: translateY(-2px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="placeholder-container">
        <div class="icon-wrapper">🚀</div>
        <h1 id="module-title">Building Content</h1>
        <p>Our curriculum engineers are actively crafting this interactive lab environment. It will be wired up with complete live-execution sandboxes shortly!</p>
        <a href="javascript:history.back()" class="action-btn">Return to Details</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const moduleName = urlParams.get('module');
            if (moduleName) {
                document.getElementById("module-title").textContent = `${moduleName} (Coming Soon)`;
            }
        });
    </script>
</body>
</html>
