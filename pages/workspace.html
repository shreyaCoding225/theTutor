<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Workspace - theTutor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/workspace.css?v=0">
</head>

<body>
    <header class="workspace-header">
        <a href="javascript:history.back()" class="exit-btn">✕ Exit Lab</a>
        <h2 id="workspace-module-title">Loading Module...</h2>
        <span class="status-badge live">● Interactive Sandbox</span>
    </header>

    <!-- Inside pages/workspace.html main block -->
    <main class="workspace-split">
        <!-- Left Panel: Instruction/Guided Step Deck -->
        <section class="panel instructions-panel">
            <div class="panel-content">
                <div class="step-dots">
                    <div class="dot active" id="dot-1"></div>
                    <div class="dot" id="dot-2"></div>
                    <div class="dot" id="dot-3"></div>
                </div>

                <h3 id="step-title">1. Theoretical Overview</h3>
                <p id="instruction-text">Loading...</p>

                <div id="workspace-task-box" class="task-box" style="display: none;">
                    <p id="task-text"></p>
                </div>

                <div class="interactive-controls">
                    <button id="workspace-back-btn" class="secondary-btn" style="display: none;">Back</button>
                    <button id="workspace-action-btn" class="primary-btn">Continue</button>
                </div>
            </div>
        </section>

        <!-- Right Panel: Hidden initially, reveals on step 3 -->
        <section class="panel playground-panel" id="playground-panel" style="display: none;">
            <div class="panel-content playground-area">
                <div class="code-editor-wrapper">
                    <textarea id="code-input" spellcheck="false"></textarea>
                </div>
                <div class="live-preview-box">
                    <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/js/workspace.js"></script>
</body>

</html>
