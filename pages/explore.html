<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theTutor</title>
    <link rel="stylesheet" href="/static/css/style.css?v=0">
    <link rel="stylesheet" href="/static/css/explore.css?v=0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <header>

        <div class="nav-bar">
            <div class="nav-div1">
                <div class="title">
                    <a href="/">theTutor</a>
                </div>
            </div>
            <div class="nav-div2">
                <i class="fa-solid fa-bars" id="hamburger"></i>
                <a href="/profile" class="nav-option">Profile</a>
                <a href="/explore" class="nav-option">Explore</a>
                <a href="/progress" class="nav-option">Progress</a>
                <a href="/assessments" class="nav-option">Assessments</a>
                <a href="/sign-in" class="nav-option" id="sign">Sign In</a>
            </div>
            <div class="nav-menu">
                <a href="/profile" class="dropdown-option">Profile</a>
                <a href="/explore" class="dropdown-option">Explore</a>
                <a href="/progress" class="dropdown-option">Progress</a>
                <a href="/assessments" class="dropdown-option">Assessments</a>
                <a href="/sign-in" class="dropdown-option" id="sign">Sign In</a>
            </div>

        </div>

    </header>

    <main>
        <div id="hero">
            <div class="contents">
                <div class="contents-header">
                    <h1>Explore Catalog</h1>
                    <p>Search for a specific role or browse individual courses below.</p>
                </div>
                <div class="search-wrapper">
                    <input type="text" id="role-search"
                        placeholder="Type a role (e.g., Frontend, Backend) or keyword..." autocomplete="off">
                </div>
                <div class="courses-grid">
                    <!-- <div class="loading-placeholder">Loading catalog items...</div> -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="end-nav profile-nav">
            <div class="end">
                <p>&copy; 2026 theTutor. Handcrafted with Python & Custom CSS.</p>
                <p class="footer-tagline">Learn at your own latency.</p>
            </div>
        </div>
    </footer>

    <script src="/static/js/explore.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
