<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theTutor</title>
    <link rel="stylesheet" href="/static/css/style.css?v=0">
    <link rel="stylesheet" href="/static/css/signin.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <header>

        <div class="nav-bar">
            <div class="nav-div1">
                <div class="title">
                    <a href="/">theTutor</a>
                </div>
            </div>
            <div class="nav-div2">
                <i class="fa-solid fa-bars" id="hamburger"></i>
                <a href="/profile" class="nav-option">Profile</a>
                <a href="/explore" class="nav-option">Explore</a>
                <a href="/progress" class="nav-option">Progress</a>
                <a href="/assessments" class="nav-option">Assessments</a>
                <a href="/sign-in" class="nav-option" id="sign">Sign In</a>
            </div>
            <div class="nav-menu">
                <a href="/profile" class="dropdown-option">Profile</a>
                <a href="/explore" class="dropdown-option">Explore</a>
                <a href="/progress" class="dropdown-option">Progress</a>
                <a href="/assessments" class="dropdown-option">Assessments</a>
                <a href="/sign-in" class="dropdown-option" id="sign">Sign In</a>
            </div>

        </div>

    </header>

    <main>
        <div id="hero">
            <div class="sign-dash">
                <div class="dash">
                    <form action="/auth/login" method="POST" class="login-form" id="signupForm">

                        <h1 class="login">Sign Up</h1>

                        <div class="input">
                            <input type="name" id="name" name="name" required placeholder="Name">
                            <input type="email" id="email" name="email" required placeholder="Email Address">
                            <input type="password" id="password" name="password" required placeholder="Password">
                            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm Password">
                        </div>

                        <div class="options">
                            <!-- <label class="remember"><input type="checkbox" id="remember" name="remember"> Keep me logged
                                in</label> -->
                        </div>

                        <button type="submit" class="sign-btn">Sign Up</button>

                        <button type="button" class="google-btn">
                            <span class="google-content">
                                <i class="fa-brands fa-google"></i> Sign in with Google
                            </span>
                        </button>

                        <p class="signup-link">
                            Already have an account? <a href="/sign-in">Sign in</a>
                        </p>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/signup.js"></script>
</body>

</html>
